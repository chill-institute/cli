[tools]
go = "1.25.8"

[env]
GOWORK = "off"

[tasks.fmt]
description = "Format Go sources"
run = """
go_files="$(git ls-files '*.go')"
if [ -z "$go_files" ]; then
  exit 0
fi

printf '==> formatting Go files with goimports and gofmt\n'
printf '%s\n' "$go_files" | while IFS= read -r file; do
  [ -n "$file" ] || continue
  go tool goimports -w "$file"
  gofmt -w "$file"
done
"""

[tasks."fmt:check"]
description = "Check Go source formatting"
run = """
go_files="$(git ls-files '*.go')"
if [ -z "$go_files" ]; then
  exit 0
fi

gofmt_files=''
goimports_files=''
printf '%s\n' "$go_files" | while IFS= read -r file; do
  [ -n "$file" ] || continue
  gofmt_output="$(gofmt -l "$file")"
  if [ -n "$gofmt_output" ]; then
    printf '%s\n' "$gofmt_output" >> .git/.fmt-gofmt.tmp
  fi
  goimports_output="$(go tool goimports -l "$file")"
  if [ -n "$goimports_output" ]; then
    printf '%s\n' "$goimports_output" >> .git/.fmt-goimports.tmp
  fi
done

if [ -f .git/.fmt-gofmt.tmp ]; then
  gofmt_files="$(cat .git/.fmt-gofmt.tmp)"
  rm -f .git/.fmt-gofmt.tmp
fi
if [ -f .git/.fmt-goimports.tmp ]; then
  goimports_files="$(cat .git/.fmt-goimports.tmp)"
  rm -f .git/.fmt-goimports.tmp
fi

if [ -z "$gofmt_files" ] && [ -z "$goimports_files" ]; then
  printf '==> Go formatting is clean\n'
  exit 0
fi

if [ -n "$gofmt_files" ]; then
  printf 'gofmt needs to be run on:\n%s\n' "$gofmt_files" >&2
fi
if [ -n "$goimports_files" ]; then
  printf 'goimports needs to be run on:\n%s\n' "$goimports_files" >&2
fi
exit 1
"""

[tasks."fmt:staged"]
description = "Format staged Go files and restage them"
run = """
staged_go_files="$(git diff --cached --name-only --diff-filter=ACMR -- '*.go')"
if [ -z "$staged_go_files" ]; then
  exit 0
fi

printf '==> formatting staged Go files\n'
printf '%s\n' "$staged_go_files" | while IFS= read -r file; do
  [ -n "$file" ] || continue
  go tool goimports -w "$file"
  gofmt -w "$file"
done
printf '%s\n' "$staged_go_files" | while IFS= read -r file; do
  [ -n "$file" ] || continue
  git add -- "$file"
done
"""

[tasks.lint]
description = "Run static analysis"
run = "go tool golangci-lint run ./..."

[tasks."mod:check"]
description = "Ensure go.mod and go.sum are tidy without mutating them"
run = "go mod tidy -diff"

[tasks.test]
description = "Run CLI unit tests"
run = "go test ./..."

[tasks.coverage]
description = "Run tests with coverage threshold"
run = """
threshold="${MISE_COVERAGE_THRESHOLD:-80}"

printf '==> running Go tests with coverage (threshold: %s%%)\n' "$threshold"
go test ./... -covermode=atomic -coverprofile=coverage.out

total_coverage="$(
  go tool cover -func=coverage.out | awk '/^total:/ { gsub(/%/, "", $3); print $3 }'
)"

if [ -z "$total_coverage" ]; then
  printf 'failed to determine total coverage from coverage.out\n' >&2
  exit 1
fi

printf '==> total coverage: %s%%\n' "$total_coverage"

awk -v total="$total_coverage" -v threshold="$threshold" '
  BEGIN {
    if ((total + 0) < (threshold + 0)) {
      printf("coverage %.1f%% is below threshold %.1f%%\\n", total + 0, threshold + 0) > "/dev/stderr"
      exit 1
    }
  }
'
"""

[tasks.security]
description = "Run dependency vulnerability scan"
run = "go tool govulncheck ./..."

[tasks.hooks]
description = "Install repo git hooks"
run = """
repo_root="$(git rev-parse --show-toplevel)"
cd "$repo_root"
git config core.hooksPath .githooks
printf 'git hooks configured: %s/.githooks\n' "$repo_root"
"""

[tasks.verify]
description = "Run formatting, lint, coverage, and security checks"
depends = ["fmt:check", "mod:check", "lint", "coverage", "security"]
