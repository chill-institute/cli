name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: cli-release-main
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      attestations: write
      contents: write
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up mise
        uses: jdx/mise-action@v4

      - name: Cache Go dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/.cache/golangci-lint
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('mise.toml', 'go.sum', '.golangci.yml') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ hashFiles('mise.toml', 'go.sum') }}
            ${{ runner.os }}-go-

      - name: Verify
        run: mise run verify

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: v2.14.3
          args: release --clean
          workdir: ${{ github.workspace }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}

      - name: Attest release archives
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/chilly_*.tar.gz
            dist/chilly_*.zip
