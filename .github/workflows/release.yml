name: Release

on:
  push:
    tags:
      - "v*"

permissions: {}

concurrency:
  group: cli-release-main
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: release
      deployment: false
    permissions:
      attestations: write
      contents: write
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Verify
        run: mise run verify

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7.2.1
        with:
          version: v2.14.3
          args: release --clean
          workdir: ${{ github.workspace }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}

      - name: Prepare npm packages
        run: go run ./scripts/npm-package --version "${GITHUB_REF_NAME#v}"

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Pack npm packages
        run: |
          set -euo pipefail
          for package_dir in dist/npm/cli-* dist/npm/cli; do
            npm pack --dry-run "$package_dir" >/dev/null
          done

      - name: Publish npm packages
        run: |
          set -euo pipefail
          for package_dir in dist/npm/cli-*; do
            npm publish --provenance --access public "$package_dir"
          done
          npm publish --provenance --access public dist/npm/cli

      - name: Attest release archives
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            dist/chilly_*.tar.gz
            dist/chilly_*.zip
