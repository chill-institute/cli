name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: cli-release-main
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: release
    permissions:
      attestations: write
      contents: write
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up mise
        uses: jdx/mise-action@v4

      - name: Verify
        run: mise run verify

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: v2.14.3
          args: release --clean
          workdir: ${{ github.workspace }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}

      - name: Prepare npm packages
        run: go run ./scripts/npm-package --version "${GITHUB_REF_NAME#v}"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Publish npm packages
        run: |
          set -euo pipefail
          for package_dir in dist/npm/cli-*; do
            npm publish --provenance --access public "$package_dir"
          done
          npm publish --provenance --access public dist/npm/cli

      - name: Attest release archives
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/chilly_*.tar.gz
            dist/chilly_*.zip
