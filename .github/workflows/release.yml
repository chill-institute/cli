name: release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up mise
        uses: jdx/mise-action@v3

      - name: Cache Go dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/.cache/golangci-lint
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('.tool-versions', 'go.sum', '.golangci.yml') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ hashFiles('.tool-versions', 'go.sum') }}
            ${{ runner.os }}-go-

      - name: Verify
        run: mise run verify

      - name: Inspect workspace
        working-directory: ${{ github.workspace }}
        run: |
          pwd
          ls -la
          ls -la cmd
          ls -la cmd/chilly

      - name: Run GoReleaser
        working-directory: ${{ github.workspace }}
        run: go run github.com/goreleaser/goreleaser/v2@v2.14.3 release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
