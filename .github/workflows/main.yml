name: Main

on:
  push:
    branches:
      - main

permissions: {}

jobs:
  verify:
    concurrency:
      group: main-verify-${{ github.ref }}
      cancel-in-progress: true
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Cache Go dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cache/go-build
            ~/.cache/golangci-lint
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('mise.toml', 'go.sum', '.golangci.yml') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ hashFiles('mise.toml', 'go.sum') }}
            ${{ runner.os }}-go-

      - name: Verify
        run: mise run verify

  release:
    needs: [verify]
    if: ${{ needs.verify.result == 'success' }}
    concurrency:
      group: cli-release-main
      cancel-in-progress: false
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: release
      deployment: false
    permissions:
      attestations: write
      contents: write
      id-token: write
      issues: write
      pull-requests: write
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Tag next release
        id: semantic_release
        uses: cycjimmy/semantic-release-action@b12c8f6015dc215fe37bc154d4ad456dd3833c90 # v6.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com

      - name: Run GoReleaser
        if: steps.semantic_release.outputs.new_release_published == 'true'
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7.2.1
        with:
          version: v2.14.3
          args: release --clean
          workdir: ${{ github.workspace }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}

      - name: Prepare npm packages
        if: steps.semantic_release.outputs.new_release_published == 'true'
        run: go run ./scripts/npm-package --version "${{ steps.semantic_release.outputs.new_release_version }}"

      - name: Set up Node.js
        if: steps.semantic_release.outputs.new_release_published == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Pack npm packages
        if: steps.semantic_release.outputs.new_release_published == 'true'
        run: |
          set -euo pipefail
          for package_dir in dist/npm/cli-* dist/npm/cli; do
            npm pack --dry-run "$package_dir" >/dev/null
          done

      - name: Publish npm packages
        if: steps.semantic_release.outputs.new_release_published == 'true'
        run: |
          set -euo pipefail

          publish_package() {
            local package_dir="$1"
            local package_name
            local package_version

            package_name="$(node -p "require('./${package_dir}/package.json').name")"
            package_version="$(node -p "require('./${package_dir}/package.json').version")"

            if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
              printf '%s@%s is already published; skipping\n' "$package_name" "$package_version"
              return 0
            fi

            for attempt in 1 2 3; do
              if npm publish --provenance --access public "$package_dir"; then
                return 0
              fi

              if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
                printf '%s@%s is visible after publish failure; continuing\n' "$package_name" "$package_version"
                return 0
              fi

              if [ "$attempt" -eq 3 ]; then
                return 1
              fi

              sleep "$((attempt * 10))"
            done
          }

          for package_dir in dist/npm/cli-*; do
            publish_package "$package_dir"
          done
          publish_package dist/npm/cli

      - name: Attest release archives
        if: steps.semantic_release.outputs.new_release_published == 'true'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            dist/chilly_*.tar.gz
            dist/chilly_*.zip
