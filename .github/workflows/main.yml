name: Main

on:
  push:
    branches:
      - main

jobs:
  verify:
    concurrency:
      group: main-verify-${{ github.ref }}
      cancel-in-progress: true
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up mise
        uses: jdx/mise-action@v4

      - name: Cache Go dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/.cache/golangci-lint
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('mise.toml', 'go.sum', '.golangci.yml') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ hashFiles('mise.toml', 'go.sum') }}
            ${{ runner.os }}-go-

      - name: Verify
        run: mise run verify

  release:
    needs: [verify]
    if: ${{ needs.verify.result == 'success' }}
    concurrency:
      group: cli-release-main
      cancel-in-progress: false
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      attestations: write
      contents: write
      id-token: write
      issues: write
      pull-requests: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up mise
        uses: jdx/mise-action@v4

      - name: Cache Go dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/.cache/golangci-lint
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('mise.toml', 'go.sum', '.golangci.yml') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ hashFiles('mise.toml', 'go.sum') }}
            ${{ runner.os }}-go-

      - name: Tag next release
        id: semantic_release
        uses: cycjimmy/semantic-release-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        if: steps.semantic_release.outputs.new_release_published == 'true'
        uses: goreleaser/goreleaser-action@v7
        with:
          version: v2.14.3
          args: release --clean
          workdir: ${{ github.workspace }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}

      - name: Attest release archives
        if: steps.semantic_release.outputs.new_release_published == 'true'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/chilly_*.tar.gz
            dist/chilly_*.zip
