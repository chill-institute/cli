name: Verify

on:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up mise
        uses: jdx/mise-action@v4

      - name: Cache Go dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/.cache/golangci-lint
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('mise.toml', 'go.sum', '.golangci.yml') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ hashFiles('mise.toml', 'go.sum') }}
            ${{ runner.os }}-go-

      - name: Verify
        run: mise run verify
