name: verify

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up mise
        uses: jdx/mise-action@v3

      - name: Cache Go dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/.cache/golangci-lint
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('.tool-versions', 'go.sum', '.golangci.yml') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ hashFiles('.tool-versions', 'go.sum') }}
            ${{ runner.os }}-go-

      - name: Verify
        run: mise run verify
